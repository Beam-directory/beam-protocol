name: Deploy Docs
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'VISION.md'
      - 'CHANGELOG.md'
      - 'spec/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install and Build
        run: |
          cd docs
          npm install
          npm run build
      - name: Verify custom domain artifact
        run: |
          test -f docs/.vitepress/dist/CNAME
          grep -qx 'docs.beam.directory' docs/.vitepress/dist/CNAME
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
