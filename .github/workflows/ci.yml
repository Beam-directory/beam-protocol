name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18
          - 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Restore workspace dependencies cache
        uses: actions/cache@v4
        with:
          # Cache installed dependencies directly because this repo uses npm workspaces
          # and the job intentionally runs `npm install` from the repository root.
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-

      - name: Install dependencies
        run: npm install

      - name: Type check workspaces
        run: npm run typecheck

      - name: Run tests
        run: npm test

