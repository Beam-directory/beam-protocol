name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  monorepo:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Build workspaces
        run: npm run build

      - name: Test workspaces
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    needs: monorepo
    strategy:
      matrix:
        node: [20, 22]
        python: ['3.10', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install workspace dependencies
        run: npm ci

      - name: Build workspaces
        run: npm run build

      - name: Install Python SDK dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e packages/sdk-python

      - name: Run cross-stack E2E compatibility check
        run: npm run test:e2e

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs
        working-directory: docs
        run: npm run build

  quickstart:
    runs-on: ubuntu-latest
    needs: monorepo
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Build workspaces
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Prepare quickstart env
        run: cp ops/quickstart/.env.example ops/quickstart/.env

      - name: Boot hosted quickstart stack
        run: docker compose -f ops/quickstart/compose.yaml --env-file ops/quickstart/.env up -d --build

      - name: Run hosted quickstart smoke path
        run: npm run quickstart:smoke

      - name: Run dashboard UI smoke path
        run: npm run quickstart:ui-smoke

      - name: Upload quickstart UI smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-ui-smoke
          path: tmp/dashboard-ui-smoke
          if-no-files-found: ignore

      - name: Tear down quickstart stack
        if: always()
        run: docker compose -f ops/quickstart/compose.yaml --env-file ops/quickstart/.env down -v --remove-orphans

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [monorepo, e2e, docs, quickstart]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Build workspaces
        run: npm run build

      - name: Publish SDK to npm
        run: npm publish --workspace=packages/sdk-typescript --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish CLI to npm
        run: npm publish --workspace=packages/cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-directory:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Prepare tagged release metadata
        env:
          TAG_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          VERSION="${TAG_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $VERSION does not match package.json version $PACKAGE_VERSION" >&2
            exit 1
          fi

          DEPLOYED_AT="$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")"

          node scripts/release/write-directory-release-metadata.mjs \
            --version "$VERSION" \
            --git-sha "$GITHUB_SHA" \
            --deployed-at "$DEPLOYED_AT"

          echo "BEAM_RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BEAM_RELEASE_SHA=$GITHUB_SHA" >> "$GITHUB_ENV"
          echo "BEAM_DEPLOYED_AT=$DEPLOYED_AT" >> "$GITHUB_ENV"

      - name: Install Flyctl
        run: curl -L https://fly.io/install.sh | FLYCTL_INSTALL=/home/runner/.fly sh

      - name: Clear stale Fly release env overrides
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          test -n "$FLY_API_TOKEN" || { echo "Missing FLY_API_TOKEN repo secret" >&2; exit 1; }
          /home/runner/.fly/bin/flyctl secrets unset \
            BEAM_RELEASE_VERSION \
            BEAM_RELEASE_SHA \
            BEAM_DEPLOYED_AT \
            --app beam-protocol \
            --stage || true

      - name: Deploy directory API to Fly.io
        working-directory: packages/directory
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          test -n "$FLY_API_TOKEN" || { echo "Missing FLY_API_TOKEN repo secret" >&2; exit 1; }
          /home/runner/.fly/bin/flyctl deploy \
            --config fly.toml \
            --app beam-protocol \
            --remote-only \
            --yes

      - name: Verify live API release truth
        run: |
          node scripts/release/verify-api-release-truth.mjs \
            --base-url "https://api.beam.directory" \
            --version "$BEAM_RELEASE_VERSION" \
            --git-sha "$BEAM_RELEASE_SHA" \
            --deployed-at "$BEAM_DEPLOYED_AT"

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [publish, deploy-directory]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          NOTES_FILE="reports/${VERSION}-release-notes-draft.md"

          if [ ! -f "$NOTES_FILE" ]; then
            echo "Expected release notes file not found: $NOTES_FILE" >&2
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --title "$TAG_NAME" \
              --notes-file "$NOTES_FILE" \
              --latest
          else
            gh release create "$TAG_NAME" \
              --verify-tag \
              --title "$TAG_NAME" \
              --notes-file "$NOTES_FILE" \
              --latest
          fi
