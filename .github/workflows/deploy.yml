name: Deploy Directory

on:
  push:
    branches:
      - main
    paths:
      - packages/directory/**

concurrency:
  group: deploy-directory
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy directory service
        # Use the root-level Fly config and Dockerfile so Fly builds the same artifact
        # that developers can reproduce locally with `docker build .`.
        run: flyctl deploy --config fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

