app = "beam-directory"
primary_region = "fra"

[build]

[env]
  PORT = "3100"

[http_service]
  internal_port = 3100
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[mounts]
  source = "beam_data"
  destination = "/data"
