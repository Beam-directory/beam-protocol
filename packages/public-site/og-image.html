<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beam Protocol OG Image</title>
  <style>
    :root {
      --ink: #fff7f1;
      --ink-soft: rgba(255, 247, 241, 0.74);
      --line: rgba(255, 255, 255, 0.08);
      --accent: #f15a24;
      --accent-soft: #ff8c58;
      --panel: rgba(255, 255, 255, 0.06);
      --panel-strong: rgba(255, 255, 255, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: "Space Grotesk", "Inter", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 12%, rgba(255, 182, 132, 0.28), transparent 24%),
        radial-gradient(circle at 86% 10%, rgba(241, 90, 36, 0.18), transparent 18%),
        linear-gradient(140deg, #130e0a 0%, #20140f 38%, #3b1d0f 100%);
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: radial-gradient(circle at center, black 18%, transparent 88%);
      opacity: 0.45;
      pointer-events: none;
    }

    .frame {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 44px 46px 40px;
      display: grid;
      grid-template-columns: minmax(0, 0.92fr) minmax(0, 1.08fr);
      gap: 28px;
    }

    .copy {
      display: grid;
      align-content: space-between;
      min-width: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.08);
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 247, 241, 0.82);
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      box-shadow: 0 0 0 7px rgba(255, 140, 88, 0.14);
    }

    .headline {
      display: grid;
      gap: 16px;
      margin-top: 22px;
    }

    .headline h1 {
      font-size: 66px;
      line-height: 0.93;
      letter-spacing: -0.06em;
      max-width: 9ch;
    }

    .headline p {
      max-width: 39ch;
      color: var(--ink-soft);
      font-size: 21px;
      line-height: 1.45;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 247, 241, 0.84);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .mark {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(140deg, var(--accent-soft), var(--accent));
      color: white;
      font-size: 24px;
      font-weight: 700;
      box-shadow: 0 20px 40px rgba(241, 90, 36, 0.28);
    }

    .brand-copy {
      display: grid;
      gap: 3px;
    }

    .brand-copy strong {
      font-size: 20px;
      letter-spacing: -0.03em;
    }

    .brand-copy span {
      color: rgba(255, 247, 241, 0.72);
      font-size: 14px;
    }

    .proof {
      position: relative;
      min-width: 0;
    }

    .panel {
      position: absolute;
      overflow: hidden;
      border-radius: 26px;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(12px);
      box-shadow: 0 28px 80px rgba(4, 6, 12, 0.34);
      padding: 14px;
    }

    .panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: #0d1322;
    }

    .panel.overview {
      inset: 16px 0 92px 36px;
      transform: rotate(-2deg);
    }

    .panel.trace {
      width: 325px;
      height: 360px;
      right: 8px;
      bottom: 8px;
      transform: rotate(3deg);
      background: var(--panel-strong);
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="copy">
      <div>
        <div class="eyebrow">Verified partner handoffs</div>
        <div class="headline">
          <h1>Beam Protocol</h1>
          <p>One company agent hands work to another with signed messages, traceable nonces, and operator-visible recovery.</p>
        </div>
        <div class="pills">
          <div class="pill">Hosted demo</div>
          <div class="pill">Nonce traces</div>
          <div class="pill">0 alerts baseline</div>
        </div>
      </div>

      <div class="brand">
        <div class="mark">B</div>
        <div class="brand-copy">
          <strong>beam.directory</strong>
          <span>Acme-to-Northwind proof path with real dashboard evidence</span>
        </div>
      </div>
    </div>

    <div class="proof">
      <div class="panel overview">
        <img src="/assets/dashboard-overview.png" alt="" />
      </div>
      <div class="panel trace">
        <img src="/assets/dashboard-trace.png" alt="" />
      </div>
    </div>
  </div>
</body>
</html>
