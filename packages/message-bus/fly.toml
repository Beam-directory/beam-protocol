app = "beam-message-bus"
primary_region = "fra"

[build]

[env]
  PORT = "8420"
  DB_PATH = "/data/beam-bus.sqlite"
  DIRECTORY_URL = "https://api.beam.directory"

[http_service]
  internal_port = 8420
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "beam_bus_data"
  destination = "/data"
