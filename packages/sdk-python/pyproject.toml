[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "beam-directory"
version = "0.2.0"
description = "Python SDK for the Beam Protocol — SMTP for AI Agents"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
keywords = ["agent-to-agent", "a2a", "ai-agents", "beam-protocol", "ed25519"]
authors = [
  { name = "Beam Protocol Contributors" }
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
  "cryptography>=42.0.0",
  "httpx>=0.26.0",
]

[project.optional-dependencies]
websocket = [
  "websockets>=12.0",
]
dev = [
  "pytest>=8.0.0",
  "pytest-asyncio>=0.23.0",
  "cryptography>=42.0.0",
  "httpx>=0.26.0",
]

[project.urls]
Homepage = "https://beam.directory"
Repository = "https://github.com/Beam-directory/beam-protocol"
Documentation = "https://beam.directory/docs"

[tool.hatch.build.targets.wheel]
packages = ["beam_directory"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
