app = "beam-protocol"
primary_region = "fra"

[build]

[env]
  PORT = "3100"
  DB_PATH = "/data/beam-directory.db"
  # Secret: JWT_SECRET (set via `fly secrets set JWT_SECRET=...`)

[http_service]
  internal_port = 3100
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "beam_data"
  destination = "/data"
