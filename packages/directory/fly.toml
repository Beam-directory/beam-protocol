app = "beam-directory"
primary_region = "fra"

[build]

[env]
  PORT = "3100"
  DB_PATH = "/data/beam-directory.db"

[http_service]
  internal_port = 3100
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "beam_data"
  destination = "/data"
