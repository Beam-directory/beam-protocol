{
  "intents": [
    {
      "id": "escalation.request",
      "description": "Agent escalates a case to another agent",
      "from": ["fischer", "clara", "james"],
      "to": ["jarvis"],
      "params": {
        "caseId": { "type": "string", "required": true },
        "reason": { "type": "string", "required": true },
        "urgency": { "type": "string", "enum": ["low", "medium", "high", "critical"] },
        "customerName": { "type": "string" }
      },
      "response": {
        "action": { "type": "string" },
        "nextSteps": { "type": "string" }
      }
    },
    {
      "id": "payment.status_check",
      "description": "Check payment status for a project/invoice",
      "from": ["clara", "jarvis", "james"],
      "to": ["fischer"],
      "params": {
        "projectId": { "type": "string" },
        "invoiceNumber": { "type": "string" },
        "customerName": { "type": "string" }
      },
      "response": {
        "status": { "type": "string", "enum": ["paid", "partial", "overdue", "unknown"] },
        "amount": { "type": "number" },
        "details": { "type": "string" }
      }
    },
    {
      "id": "sales.pipeline_summary",
      "description": "Get sales pipeline overview",
      "from": ["jarvis", "fischer", "james"],
      "to": ["clara"],
      "params": {
        "timeRange": { "type": "string", "default": "30d" },
        "owner": { "type": "string" }
      },
      "response": {
        "totalDeals": { "type": "number" },
        "totalValue": { "type": "number" },
        "summary": { "type": "string" }
      }
    },
    {
      "id": "system.broadcast",
      "description": "System-wide announcement to all agents",
      "from": ["jarvis"],
      "to": ["*"],
      "params": {
        "message": { "type": "string", "required": true },
        "priority": { "type": "string", "enum": ["info", "warning", "critical"] }
      },
      "response": {
        "acknowledged": { "type": "boolean" }
      }
    },
    {
      "id": "agent.ping",
      "description": "Health check / keepalive between agents",
      "from": ["*"],
      "to": ["*"],
      "params": {
        "message": { "type": "string" }
      },
      "response": {
        "status": { "type": "string" },
        "uptime": { "type": "number" }
      }
    },
    {
      "id": "agent.introduce",
      "description": "Ask an agent to introduce itself",
      "from": ["*"],
      "to": ["*"],
      "params": {
        "question": { "type": "string" }
      },
      "response": {
        "agentResponse": { "type": "string" }
      }
    },
    {
      "id": "conversation.message",
      "description": "Natural language message — the receiving agent uses its LLM to interpret and respond. No schema required.",
      "from": ["*"],
      "to": ["*"],
      "params": {
        "message": { "type": "string", "required": true, "maxLength": 32768, "description": "Natural language message" },
        "context": { "type": "object", "description": "Optional structured context to help the receiver" },
        "language": { "type": "string", "default": "en", "description": "ISO 639-1 language hint" }
      },
      "response": {
        "message": { "type": "string", "description": "Natural language response" },
        "structured": { "type": "object", "description": "Optional machine-readable version of the response" }
      }
    },
    {
      "id": "quote.request",
      "description": "Request a supplier quote from a partner agent",
      "from": ["*"],
      "to": ["*"],
      "params": {
        "project": { "type": "string" },
        "sku": { "type": "string", "required": true },
        "quantity": { "type": "integer", "required": true },
        "shipTo": { "type": "string", "required": true },
        "neededBy": { "type": "string" }
      },
      "response": {
        "quotedUnitPriceEur": { "type": "number" },
        "totalPriceEur": { "type": "number" },
        "supplier": { "type": "string" },
        "inventory": { "type": "object" }
      }
    },
    {
      "id": "inventory.check",
      "description": "Check warehouse inventory and shipping window",
      "from": ["*"],
      "to": ["*"],
      "params": {
        "sku": { "type": "string", "required": true },
        "quantity": { "type": "integer", "required": true },
        "shipTo": { "type": "string" }
      },
      "response": {
        "available": { "type": "boolean" },
        "confidence": { "type": "string" },
        "shipWindow": { "type": "string" },
        "warehouse": { "type": "string" }
      }
    },
    {
      "id": "purchase.preflight",
      "description": "Send an async finance preflight notification for a pending purchase",
      "from": ["*"],
      "to": ["*"],
      "params": {
        "requestNonce": { "type": "string", "required": true },
        "sku": { "type": "string", "required": true },
        "quantity": { "type": "integer", "required": true },
        "totalPriceEur": { "type": "number", "required": true }
      },
      "response": {
        "accepted": { "type": "boolean" },
        "reviewedBy": { "type": "string" }
      }
    },
    {
      "id": "task.delegate",
      "description": "Delegate a task to another agent",
      "from": ["*"],
      "to": ["*"],
      "params": {
        "task": { "type": "string", "required": true },
        "context": { "type": "string" },
        "deadline": { "type": "string" },
        "priority": { "type": "string", "enum": ["low", "medium", "high"] }
      },
      "response": {
        "accepted": { "type": "boolean" },
        "estimatedCompletion": { "type": "string" },
        "result": { "type": "string" }
      }
    }
  ]
}
