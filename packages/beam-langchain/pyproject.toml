[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "beam-langchain"
version = "0.6.1"
description = "LangChain tools and toolkit for Beam Protocol agent-to-agent communication"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
keywords = ["beam-protocol", "langchain", "agents", "a2a", "toolkit"]
authors = [
  { name = "Beam Protocol Contributors" }
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
  "beam-directory>=0.6.1",
  "langchain-core>=0.3.0",
  "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
  "pytest-asyncio>=0.23.0",
]

[project.urls]
Homepage = "https://beam.directory"
Repository = "https://github.com/Beam-directory/beam-protocol"
Documentation = "https://beam.directory/docs"

[tool.hatch.build.targets.wheel]
packages = ["src/beam_langchain"]

[tool.pytest.ini_options]
testpaths = ["tests"]
