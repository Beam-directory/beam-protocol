<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap');
  body { margin: 0; background: #fff; display: flex; flex-direction: column; gap: 80px; padding: 60px; align-items: flex-start; }
  .logo-row { display: flex; align-items: center; gap: 40px; }
  .label { font-family: 'Inter', sans-serif; font-size: 13px; color: #999; width: 200px; }
</style>
</head>
<body>

<!-- V29A: Inter Black + clean diagonal beam -->
<div class="logo-row">
  <span class="label">V29A — Inter Black<br>Diagonaler Beam vom B</span>
  <svg width="400" height="120" viewBox="0 0 400 120">
    <defs>
      <clipPath id="textClipA">
        <text x="20" y="90" font-family="Inter" font-weight="900" font-size="96" letter-spacing="-2">beam</text>
      </clipPath>
    </defs>
    <text x="20" y="90" font-family="Inter" font-weight="900" font-size="96" letter-spacing="-2" fill="#18181B">beam</text>
    <!-- Orange beam cutting through -->
    <polygon points="15,75 340,42 340,52 15,85" fill="#F75C03" opacity="0.92"/>
  </svg>
</div>

<!-- V29B: Same but beam tapers to point -->
<div class="logo-row">
  <span class="label">V29B — Inter Black<br>Tapered Beam (Pill→Spitze)</span>
  <svg width="420" height="120" viewBox="0 0 420 120">
    <text x="20" y="90" font-family="Inter" font-weight="900" font-size="96" letter-spacing="-2" fill="#18181B">beam</text>
    <!-- Tapered beam: rounded start, sharp end -->
    <path d="M12,78 C12,72 18,68 24,68 L24,68 L390,55 L24,88 C18,88 12,84 12,78 Z" fill="#F75C03"/>
  </svg>
</div>

<!-- V29C: Space Grotesk Bold -->
<div class="logo-row">
  <span class="label">V29C — Space Grotesk Bold<br>Horizontaler Beam</span>
  <svg width="380" height="120" viewBox="0 0 380 120">
    <text x="16" y="88" font-family="Space Grotesk" font-weight="700" font-size="92" letter-spacing="-1" fill="#18181B">beam</text>
    <!-- Horizontal beam with rounded start -->
    <rect x="10" y="58" width="360" height="10" rx="5" fill="#F75C03"/>
    <!-- Sharp taper extension -->
    <polygon points="360,58 360,68 395,63" fill="#F75C03"/>
  </svg>
</div>

<!-- V29D: Plus Jakarta Sans ExtraBold, beam from b bowl -->
<div class="logo-row">
  <span class="label">V29D — Jakarta Sans 800<br>Beam aus dem B-Bauch</span>
  <svg width="400" height="120" viewBox="0 0 400 120">
    <text x="20" y="90" font-family="Plus Jakarta Sans" font-weight="800" font-size="94" letter-spacing="-1" fill="#18181B">beam</text>
    <!-- Beam starting from b's bowl, slight upward angle -->
    <path d="M52,78 C52,73 56,70 61,70 L380,52 L380,58 L61,82 C56,82 52,83 52,78 Z" fill="#F75C03"/>
  </svg>
</div>

<!-- V29E: BOLD Statement — beam with dot -->
<div class="logo-row">
  <span class="label">V29E — Inter Black<br>beam. mit Beam + Dot</span>
  <svg width="440" height="120" viewBox="0 0 440 120">
    <text x="20" y="90" font-family="Inter" font-weight="900" font-size="96" letter-spacing="-2" fill="#18181B">beam</text>
    <!-- Orange dot after m -->
    <circle cx="340" cy="88" r="10" fill="#F75C03"/>
    <!-- Subtle beam connecting b to dot -->
    <path d="M18,76 Q180,62 330,80" stroke="#F75C03" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  </svg>
</div>

<!-- V29F: The KNALLER — thick beam, high contrast -->
<div class="logo-row">
  <span class="label">V29F — Inter Black<br>KNALLER: Dicker Beam</span>
  <svg width="420" height="130" viewBox="0 0 420 130">
    <text x="20" y="95" font-family="Inter" font-weight="900" font-size="100" letter-spacing="-3" fill="#18181B">beam</text>
    <!-- THICK orange beam, diagonal, rounded start, sharp end -->
    <path d="M8,82 C8,72 16,65 26,65 L26,65 L400,48 L26,100 C16,100 8,93 8,82 Z" fill="#F75C03"/>
  </svg>
</div>

</body>
</html>
