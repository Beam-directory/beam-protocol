dbs:
  - path: /data/beam-directory.db
    replicas:
      - type: s3
        bucket: ${LITESTREAM_REPLICA_BUCKET}
        path: beam-directory
        endpoint: ${LITESTREAM_REPLICA_ENDPOINT}
        region: ${LITESTREAM_REPLICA_REGION}
        retention: 72h
        sync-interval: 10s
        snapshot-interval: 1h
